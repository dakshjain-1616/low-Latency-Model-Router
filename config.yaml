# Low-Latency Model Router Configuration

# Server settings
server:
  host: "0.0.0.0"
  port: 8000
  reload: false

# Redis configuration
redis:
  host: "localhost"
  port: 6379
  db: 0
  password: null
  ttl_seconds: 3600  # Cache TTL

# OpenRouter API
openrouter:
  base_url: "https://openrouter.ai/api/v1"
  api_key: ""  # Set via environment variable OPENROUTER_API_KEY
  timeout_seconds: 30

# Default routing weights (latency, cost, quality)
routing:
  default_weights:
    latency: 0.4
    cost: 0.3
    quality: 0.3
  
  # Model fallback order
  fallback_models:
    - "openai/gpt-5.4-mini"
    - "google/gemini-3.1-flash-lite-preview"
    - "anthropic/claude-sonnet-4.6"

# Metrics configuration
metrics:
  window_size: 100  # Rolling window for metrics
  retention_hours: 24
